<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViSteam</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-glow" aria-hidden="true"></div>

    <div class="layout">
        <aside class="rail" aria-label="Primary navigation">
            <div class="brand">ViSteam</div>
            <nav>
                <a href="#">
                    <span class="icon icon-overview" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="presentation"><circle cx="12" cy="12" r="7" /></svg>
                    </span>
                    <span>Overview</span>
                </a>
                <a href="#">
                    <span class="icon icon-dashboards" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="presentation"><rect x="4" y="4" width="6" height="6" /><rect x="14" y="4" width="6" height="6" /><rect x="4" y="14" width="6" height="6" /><rect x="14" y="14" width="6" height="6" /></svg>
                    </span>
                    <span>Dashboards</span>
                </a>
                <a href="#">
                    <span class="icon icon-alerts" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="presentation"><path d="M12 3l-3 7h4l-2 7 6-9h-4z" /></svg>
                    </span>
                    <span>Alerts</span>
                </a>
                <a href="#">
                    <span class="icon icon-data" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="presentation"><path d="M7 12a5 5 0 0 1 5-5h5" /><path d="M17 12a5 5 0 0 1-5 5H7" /><circle cx="7" cy="12" r="2" /><circle cx="17" cy="12" r="2" /></svg>
                    </span>
                    <span>Data Feeds</span>
                </a>
            </nav>
            <button class="ghost">
                <span class="icon icon-settings" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="presentation"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z" /><path d="M4 12h2m12 0h2M12 4v2m0 12v2M6.5 6.5l1.4 1.4m8.2 8.2l1.4 1.4m0-11l-1.4 1.4m-8.2 8.2l-1.4 1.4" /></svg>
                </span>
                <span>Settings</span>
            </button>
        </aside>

        <div class="workspace">
            <header class="top-bar">
                <div>
                    <p class="eyebrow">Steam Intelligence</p>
                    <h1>Command Dashboard</h1>
                </div>
                <div class="top-bar__actions">
                    <button class="pill">Sync Sources</button>
                    <span class="status-dot" aria-label="Live data active"></span>
                </div>
            </header>

            <section class="signal-band" aria-label="quick metrics">
                <article>
                    <p>Tracked Titles</p>
                    <strong>500</strong>
                </article>
                <article>
                    <p>Last Sync</p>
                    <strong>3m ago</strong>
                </article>
                <article>
                    <p>Alerts</p>
                    <strong>• •</strong>
                </article>
                <article>
                    <p>Next Refresh</p>
                    <strong>02:00 UTC</strong>
                </article>
            </section>

            <section class="canvas" aria-label="graph staging area">
                <div class="canvas__grid">
                    <article class="canvas__cell canvas__cell--primary">
                        <header>Primary Graph Canvas</header>
                    </article>
                    <article class="canvas__cell">
                        <header>Secondary View</header>
                    </article>
                    <article class="canvas__cell">
                        <header>Comparison View</header>
                    </article>
                </div>
                <p class="canvas__hint">Drop charts, heatmaps, or timelines into any panel when your data is ready.</p>
            </section>
        </div>
    </div>
</body>
</html>
